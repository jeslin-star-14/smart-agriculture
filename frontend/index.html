<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Agriculture IoT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:        #060d1f;
        --bg2:       #0b1530;
        --card:      rgba(13, 25, 60, 0.85);
        --card2:     rgba(10, 20, 50, 0.9);
        --border:    rgba(59, 130, 246, 0.15);
        --border2:   rgba(59, 130, 246, 0.3);
        --blue:      #3b82f6;
        --blue2:     #60a5fa;
        --cyan:      #06b6d4;
        --green:     #10b981;
        --amber:     #f59e0b;
        --red:       #ef4444;
        --text:      #e2e8f0;
        --muted:     #64748b;
        --muted2:    #94a3b8;
        --glow-blue: rgba(59,130,246,0.25);
        --glow-cyan: rgba(6,182,212,0.2);
      }
      html, body, #root { min-height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        overflow-x: hidden;
      }
      body::before {
        content: '';
        position: fixed; inset: 0;
        background:
          radial-gradient(ellipse 80% 50% at 20% 10%, rgba(59,130,246,0.08) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 60%),
          radial-gradient(ellipse 100% 100% at 50% 50%, rgba(6,15,40,1) 0%, transparent 100%);
        pointer-events: none; z-index: 0;
      }
      #root { position: relative; z-index: 1; }
      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.4} }
      @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
      @keyframes popIn   { from{opacity:0;transform:translate(-50%,-50%) scale(0.85)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
      @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
